name: Refresh feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install sqlalchemy

      - name: Refresh feed
        id: refresh
        run: python scripts/refresh.py

      - name: Commit updated site
        run: |
          git config user.name "feed-refresh-bot"
          git config user.email "bot@example.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh feed [skip ci]"
            git push
          fi

      - name: Report failure
        if: failure()
        run: echo "::error::Feed refresh failed; see job logs above."
